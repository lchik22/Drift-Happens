server {
  listen 4200;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy /api → the api service. Production environment uses /api,
  # so the browser never needs to know the API host.
  location /api/ {
    proxy_pass http://api:3000/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  # Socket.IO transport endpoint. The `/deltas` namespace is selected by the
  # client and travels in the handshake, so we just need to proxy /socket.io/.
  location /socket.io/ {
    proxy_pass http://api:3000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400;
  }

  # Hash-routed SPA — index.html for everything else.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
