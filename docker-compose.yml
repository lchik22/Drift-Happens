services:
  postgres:
    image: postgres:16-alpine
    container_name: drift-postgres
    environment:
      POSTGRES_USER: drift
      POSTGRES_PASSWORD: drift
      POSTGRES_DB: drift
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drift -d drift"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: drift-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./server
    image: drift-server:local
    container_name: drift-api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      API_PORT: 3000
      DATABASE_URL: postgres://drift:drift@postgres:5432/drift
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    ports:
      - "3000:3000"
    command: ["node", "dist/apps/api/main.js"]
    init: true
    restart: unless-stopped

  worker:
    build:
      context: ./server
    image: drift-server:local
    container_name: drift-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DATABASE_URL: postgres://drift:drift@postgres:5432/drift
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    command: ["node", "dist/apps/worker/main.js"]
    init: true
    restart: unless-stopped

volumes:
  pgdata:
